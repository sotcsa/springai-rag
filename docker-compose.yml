services:
  # ========================================
  # Oracle 23ai Free (Vector DB)
  # ========================================
  oracle-db:
    image: gvenzl/oracle-free:23-slim
    container_name: oracle-23ai
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: ${ORACLE_SYS_PASSWORD:-SysPassword123}
      APP_USER: ${ORACLE_USER:-raguser}
      APP_USER_PASSWORD: ${ORACLE_PASSWORD:-ragpassword}
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: [ "CMD", "healthcheck.sh" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  # ========================================
  # Ollama (Local LLM + Embeddings)
  # ========================================
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    # GPU support (uncomment if NVIDIA GPU available)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: [ "CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/11434 && echo -e 'GET / HTTP/1.0\\r\\n\\r\\n' >&3 && cat <&3 | head -1 | grep -q 'HTTP'" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ========================================
  # Pull Ollama Models (init container)
  # ========================================
  ollama-setup:
    image: curlimages/curl:latest
    container_name: ollama-setup
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        echo "Pulling embedding model: nomic-embed-text..."
        curl -s http://ollama:11434/api/pull -d '{"name": "nomic-embed-text"}' | tail -1
        echo ""
        echo "Pulling chat model: llama3.2..."
        curl -s http://ollama:11434/api/pull -d '{"name": "llama3.2"}' | tail -1
        echo ""
        echo "Models ready!"

  # ========================================
  # RAG Application
  # ========================================
  rag-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      ORACLE_JDBC_URL: jdbc:oracle:thin:@oracle-db:1521/FREEPDB1
      ORACLE_USER: ${ORACLE_USER:-raguser}
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-ragpassword}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
    depends_on:
      oracle-db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  oracle-data:
    driver: local
  ollama-data:
    driver: local
