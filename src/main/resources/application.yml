spring:
  application:
    name: springai-rag

  # Servlet configuration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.OracleDialect

  # Thymeleaf
  thymeleaf:
    cache: false

  # Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # ========================================
  # Spring AI - Ollama Configuration
  # ========================================
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3.2
          temperature: 0.3
          num-ctx: 8192
      embedding:
        options:
          model: bge-m3
    vectorstore:
      oracle:
        initialize-schema: true

# ========================================
# Oracle Database Configuration
# ========================================
  datasource:
    url: jdbc:oracle:thin:@localhost:1521/FREEPDB1
    username: ${ORACLE_USER:raguser}
    password: ${ORACLE_PASSWORD:ragpassword}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      idle-timeout: 30000
      pool-name: RAG-HikariPool
      max-lifetime: 1800000
      connection-timeout: 30000

# ========================================
# Application Configuration
# ========================================
app:
  chunking:
    chunk-size: 800
    chunk-overlap: 100
    min-chunk-size: 100

# ========================================
# Actuator / Monitoring
# ========================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# ========================================
# Logging
# ========================================
logging:
  level:
    root: INFO
    com.example.rag: DEBUG
    org.springframework.ai: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Server
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
